<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Dashboard Tempahan Bas</title>

<meta name="theme-color" content="#1976d2">

<link rel="icon" href="logo.jpg">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
}

header{
text-align:center;
margin-bottom:20px;
}

.logo{
height:80px;
}

.menu{
text-align:center;
margin-bottom:20px;
}

.menu a{
margin:0 10px;
text-decoration:none;
font-weight:bold;
color:#1976d2;
}

table{
border-collapse:collapse;
margin:20px auto;
width:90%;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#1976d2;
color:white;
}

button{
padding:6px 10px;
border:none;
background:#1976d2;
color:white;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#125aa0;
}

.tersedia{
color:green;
font-weight:bold;
}

.ditempah{
color:red;
font-weight:bold;
}

.kalendar{
width:80%;
margin:auto;
}

.kalendar li{
padding:8px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>Dashboard Tempahan Bas</h1>
<h3>SM Sains Alor Gajah</h3>

</header>


<div class="menu">

<a href="index.html">Menu Utama</a>
<a href="tempahan.html">Tempah Bas</a>

</div>


<h2 style="text-align:center;">Senarai Tempahan</h2>

<table>

<thead>

<tr>
<th>Nama Pemohon</th>
<th>Tarikh Pergi</th>
<th>Tarikh Pulang</th>
<th>Tujuan</th>
<th>Kenderaan</th>
<th>PDF</th>
</tr>

</thead>

<tbody id="dataTempahan">

</tbody>

</table>


<h2 style="text-align:center;">Status Kenderaan</h2>

<table>

<thead>

<tr>
<th>Tarikh</th>
<th>Bas</th>
<th>Van</th>
<th>Coaster</th>
</tr>

</thead>

<tbody id="statusTempahan">

</tbody>

</table>


<h2 style="text-align:center;">Kalendar Tempahan</h2>

<ul id="kalendarTempahan" class="kalendar">

</ul>


<script>

const URL="https://script.google.com/macros/s/AKfycby6wnDHTMcQpyQnEHbwqtX5jbj45z_vvORbYQa7MdOQDUcs7I5bYYQaHcEK7lJGBzgdRg/exec";


function formatTarikh(t){

let d=new Date(t);

return d.toLocaleDateString("en-GB");

}


function downloadPDF(item){

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

doc.setFontSize(16);
doc.text("BORANG TEMPAHAN BAS",20,20);

doc.setFontSize(12);

doc.text("Nama Pemohon : "+item.nama,20,60);
doc.text("Tarikh Pergi : "+formatTarikh(item.tarikhPergi),20,70);
doc.text("Tarikh Pulang : "+formatTarikh(item.tarikhPulang),20,80);
doc.text("Tujuan : "+item.aktiviti,20,90);
doc.text("Kenderaan : "+item.kenderaan,20,100);

doc.save("tempahan_bas.pdf");

}


function showData(data){

/* SUSUN TARIKH MENURUN (TERBARU DI ATAS) */

data.sort(function(a,b){

return new Date(b.tarikhPergi) - new Date(a.tarikhPergi);

});


let html="";
let status={};
let kalendar="";


data.forEach(function(item){

html+="<tr>";

html+="<td>"+item.nama+"</td>";
html+="<td>"+formatTarikh(item.tarikhPergi)+"</td>";
html+="<td>"+formatTarikh(item.tarikhPulang)+"</td>";
html+="<td>"+item.aktiviti+"</td>";
html+="<td>"+item.kenderaan+"</td>";

html+="<td><button onclick='downloadPDF("+JSON.stringify(item)+")'>PDF</button></td>";

html+="</tr>";



/* STATUS KENDERAAN */

let tarikh=formatTarikh(item.tarikhPergi);

if(!status[tarikh]){

status[tarikh]={

Bas:true,
Van:true,
Coaster:true

};

}

if(item.kenderaan.includes("Bas")){
status[tarikh].Bas=false;
}

if(item.kenderaan.includes("Van")){
status[tarikh].Van=false;
}

if(item.kenderaan.includes("Coaster")){
status[tarikh].Coaster=false;
}



/* KALENDAR */

kalendar+="<li>📅 "+formatTarikh(item.tarikhPergi)+" - "+item.kenderaan+" ("+item.aktiviti+")</li>";

});


document.getElementById("dataTempahan").innerHTML=html;


/* PAPAR STATUS */

let htmlStatus="";

for(let tarikh in status){

htmlStatus+="<tr>";

htmlStatus+="<td>"+tarikh+"</td>";

htmlStatus+="<td class='"+(status[tarikh].Bas?"tersedia":"ditempah")+"'>"
+(status[tarikh].Bas?"✅":"❌")+"</td>";

htmlStatus+="<td class='"+(status[tarikh].Van?"tersedia":"ditempah")+"'>"
+(status[tarikh].Van?"✅":"❌")+"</td>";

htmlStatus+="<td class='"+(status[tarikh].Coaster?"tersedia":"ditempah")+"'>"
+(status[tarikh].Coaster?"✅":"❌")+"</td>";

htmlStatus+="</tr>";

}

document.getElementById("statusTempahan").innerHTML=htmlStatus;


/* PAPAR KALENDAR */

document.getElementById("kalendarTempahan").innerHTML=kalendar;

}


function loadDashboard(){

var script=document.createElement("script");

script.src=URL+"?callback=showData";

document.body.appendChild(script);

}

loadDashboard();

</script>

</body>
</html>
