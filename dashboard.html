<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Dashboard Tempahan Bas</title>

<meta name="theme-color" content="#e0e0e0">

<link rel="icon" href="logo.jpg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--warna-background:#e0e0e0;
--warna-tab:#757575;
--warna-button:#2e7d32;
--warna-hover:#1b5e20;
}

body{
font-family:Arial;
margin:0;
background:var(--warna-background);
}

header{
text-align:center;
padding:15px;
}

.logo{
height:70px;
}

.menu{
text-align:center;
padding:10px;
}

.menu a{
color:black;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

.section-title{
background:var(--warna-tab);
color:white;
width:90%;
margin:25px auto 0 auto;
padding:10px;
border-radius:5px 5px 0 0;
}

table{
border-collapse:collapse;
width:90%;
margin:auto;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#9e9e9e;
color:white;
}

button{
background:var(--warna-button);
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:var(--warna-hover);
}

.today{
background:#ffcccc;
}

.soon{
background:#fff3cd;
}

.clash{
background:#f8d7da;
}

.kalendar{
width:80%;
margin:auto;
background:white;
padding:10px;
}

.legend{
width:90%;
margin:auto;
background:white;
padding:10px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>Dashboard Tempahan Bas</h1>
<h3>SM Sains Alor Gajah</h3>

</header>


<div class="menu">

<a href="index.html">Menu Utama</a>
<a href="tempahan.html">Tempah Bas</a>

</div>


<div class="section-title">Senarai Tempahan</div>

<div class="legend">

<span style="color:red;">■</span> Hari Ini
&nbsp;&nbsp;
<span style="color:#b58900;">■</span> Dalam 7 Hari
&nbsp;&nbsp;
<span style="color:#a94442;">■</span> Pertindihan Tempahan

</div>

<table>

<thead>

<tr>
<th>Nama Pemohon</th>
<th>Tarikh Pergi</th>
<th>Tarikh Pulang</th>
<th>Tujuan</th>
<th>Kenderaan</th>
<th>PDF</th>
</tr>

</thead>

<tbody id="dataTempahan"></tbody>

</table>


<div class="section-title">Status Kenderaan</div>

<table>

<thead>
<tr>
<th>Tarikh</th>
<th>Bas</th>
<th>Van</th>
<th>Coaster</th>
</tr>
</thead>

<tbody id="statusTempahan"></tbody>

</table>


<div class="section-title">Kalendar Tempahan</div>

<ul id="kalendarTempahan" class="kalendar"></ul>


<script>

const URL="https://script.google.com/macros/s/AKfycby6wnDHTMcQpyQnEHbwqtX5jbj45z_vvORbYQa7MdOQDUcs7I5bYYQaHcEK7lJGBzgdRg/exec";


function formatTarikh(t){
let d=new Date(t);
return d.toLocaleDateString("en-GB");
}


/* ================= PDF BORANG ================= */

function downloadPDF(item){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

/* ===== LOGO ===== */

doc.addImage("logo.jpg","JPEG",85,10,40,30);

/* ===== TAJUK ===== */

doc.setFontSize(18);
doc.text("BORANG TEMPAHAN BAS",105,50,{align:"center"});

doc.setFontSize(14);
doc.text("SM SAINS ALOR GAJAH",105,58,{align:"center"});

/* ===== FORMAT TARIKH ===== */

function formatTarikh(t){
let d=new Date(t);
return d.toLocaleDateString("en-GB");
}

/* ===== JADUAL ===== */

let y = 80;
let row = 12;

function buatRow(label,value){

doc.rect(20,y,70,row);
doc.rect(90,y,100,row);

doc.setFontSize(12);

doc.text(label,22,y+8);
doc.text(value ? String(value) : "-",92,y+8);

y+=row;

}

buatRow("Nama Pemohon",item.nama);
buatRow("Jawatan",item.jawatan);
buatRow("Tarikh Pergi",formatTarikh(item.tarikhPergi));
buatRow("Tarikh Pulang",formatTarikh(item.tarikhPulang));
buatRow("Aktiviti",item.aktiviti);
buatRow("Tempat",item.tempat);
buatRow("Kenderaan",item.kenderaan);
buatRow("Bil Pelajar Lelaki",item.pelajarLelaki);
buatRow("Bil Pelajar Perempuan",item.pelajarPerempuan);
buatRow("Bil Guru",item.guru);

/* ===== TANDATANGAN ===== */

doc.line(30,200,80,200);
doc.text("Tandatangan Pemohon",30,210);

doc.line(130,200,180,200);
doc.text("Tandatangan Pelulus",130,210);

/* ===== TARIKH PERMOHONAN ===== */

let today = new Date().toLocaleDateString("en-GB");

doc.text("Tarikh Permohonan : "+today,30,225);

/* ===== SAVE ===== */

doc.save("Tempahan_Bas_SM_SAGA.pdf");

}


/* ================= PAPAR DATA ================= */

function showData(data){

data.sort(function(a,b){
return new Date(b.tarikhPergi)-new Date(a.tarikhPergi);
});

let html="";
let status={};
let kalendar="";

let today=new Date();
today.setHours(0,0,0,0);

data.forEach(function(item,index){

let tripDate=new Date(item.tarikhPergi);
tripDate.setHours(0,0,0,0);

let diff=(tripDate-today)/(1000*60*60*24);

let kelas="";

if(diff===0){
kelas="today";
}
else if(diff<=7 && diff>0){
kelas="soon";
}

for(let i=0;i<data.length;i++){

if(i!==index){

let other=data[i];

if(
formatTarikh(item.tarikhPergi)===formatTarikh(other.tarikhPergi)
&& item.kenderaan===other.kenderaan
){
kelas="clash";
}

}

}

html+="<tr class='"+kelas+"'>";

html+="<td>"+item.nama+"</td>";
html+="<td>"+formatTarikh(item.tarikhPergi)+"</td>";
html+="<td>"+formatTarikh(item.tarikhPulang)+"</td>";
html+="<td>"+item.aktiviti+"</td>";
html+="<td>"+item.kenderaan+"</td>";
html+="<td><button onclick='downloadPDF("+JSON.stringify(item)+")'>PDF</button></td>";

html+="</tr>";

let tarikh=formatTarikh(item.tarikhPergi);

if(!status[tarikh]){
status[tarikh]={Bas:true,Van:true,Coaster:true};
}

if(item.kenderaan.includes("Bas")) status[tarikh].Bas=false;
if(item.kenderaan.includes("Van")) status[tarikh].Van=false;
if(item.kenderaan.includes("Coaster")) status[tarikh].Coaster=false;

kalendar+="<li>📅 "+formatTarikh(item.tarikhPergi)+" - "+item.kenderaan+" ("+item.aktiviti+")</li>";

});

document.getElementById("dataTempahan").innerHTML=html;

let htmlStatus="";

for(let tarikh in status){

htmlStatus+="<tr>";

htmlStatus+="<td>"+tarikh+"</td>";

htmlStatus+="<td>"+(status[tarikh].Bas?"✅":"❌")+"</td>";
htmlStatus+="<td>"+(status[tarikh].Van?"✅":"❌")+"</td>";
htmlStatus+="<td>"+(status[tarikh].Coaster?"✅":"❌")+"</td>";

htmlStatus+="</tr>";

}

document.getElementById("statusTempahan").innerHTML=htmlStatus;

document.getElementById("kalendarTempahan").innerHTML=kalendar;

}


function loadDashboard(){

var script=document.createElement("script");

script.src=URL+"?callback=showData";

document.body.appendChild(script);

}

loadDashboard();

</script>

</body>
</html>
