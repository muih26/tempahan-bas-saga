<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Dashboard Tempahan Bas</title>

<meta name="theme-color" content="#e0e0e0">

<link rel="icon" href="logo.jpg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--warna-background:#e0e0e0;
--warna-tab:#757575;
--warna-button:#2e7d32;
--warna-hover:#1b5e20;
}

body{
font-family:Arial;
margin:0;
background:var(--warna-background);
}

header{
background:var(--warna-background);
text-align:center;
padding:15px;
}

.logo{
height:70px;
}

.menu{
background:var(--warna-background);
text-align:center;
padding:12px;
}

.menu a{
color:black;
text-decoration:none;
margin:0 20px;
font-weight:bold;
font-size:16px;
}

.section-title{
background:var(--warna-tab);
color:white;
width:90%;
margin:25px auto 0 auto;
padding:10px;
border-radius:5px 5px 0 0;
font-weight:bold;
}

table{
border-collapse:collapse;
width:90%;
margin:0 auto 25px auto;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#9e9e9e;
color:white;
}

button{
background:var(--warna-button);
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:var(--warna-hover);
}

.tersedia{
color:green;
font-weight:bold;
}

.ditempah{
color:red;
font-weight:bold;
}

.kalendar{
width:80%;
margin:auto;
background:white;
padding:10px;
}

.kalendar li{
padding:8px;
border-bottom:1px solid #ddd;
}

/* highlight */

.today{
background:#ffcccc;
}

.soon{
background:#fff3cd;
}

.clash{
background:#f8d7da;
}

/* legend */

.legend{
width:90%;
margin:auto;
background:white;
padding:10px;
border:1px solid #ddd;
}

.legend span{
margin-right:20px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>Dashboard Tempahan Bas</h1>
<h3>SM Sains Alor Gajah</h3>

</header>


<div class="menu">

<a href="index.html">Menu Utama</a>
<a href="tempahan.html">Tempah Bas</a>

</div>



<div class="section-title">Senarai Tempahan</div>

<div class="legend">

<span style="color:red;">■</span> Tempahan Hari Ini
&nbsp;&nbsp;
<span style="color:#b58900;">■</span> Tempahan Dalam 7 Hari
&nbsp;&nbsp;
<span style="color:#a94442;">■</span> Pertindihan Tempahan

</div>

<table>

<thead>
<tr>
<th>Nama Pemohon</th>
<th>Tarikh Pergi</th>
<th>Tarikh Pulang</th>
<th>Tujuan</th>
<th>Kenderaan</th>
<th>PDF</th>
</tr>
</thead>

<tbody id="dataTempahan"></tbody>

</table>



<div class="section-title">Status Kenderaan</div>

<table>

<thead>
<tr>
<th>Tarikh</th>
<th>Bas</th>
<th>Van</th>
<th>Coaster</th>
</tr>
</thead>

<tbody id="statusTempahan"></tbody>

</table>



<div class="section-title">Kalendar Tempahan</div>

<ul id="kalendarTempahan" class="kalendar"></ul>



<script>

const URL="https://script.google.com/macros/s/AKfycby6wnDHTMcQpyQnEHbwqtX5jbj45z_vvORbYQa7MdOQDUcs7I5bYYQaHcEK7lJGBzgdRg/exec";

function formatTarikh(t){
let d=new Date(t);
return d.toLocaleDateString("en-GB");
}

function downloadPDF(item){

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

doc.setFontSize(16);
doc.text("BORANG TEMPAHAN BAS",20,20);

doc.setFontSize(12);

doc.text("Nama Pemohon : "+item.nama,20,60);
doc.text("Tarikh Pergi : "+formatTarikh(item.tarikhPergi),20,70);
doc.text("Tarikh Pulang : "+formatTarikh(item.tarikhPulang),20,80);
doc.text("Tujuan : "+item.aktiviti,20,90);
doc.text("Kenderaan : "+item.kenderaan,20,100);

doc.save("tempahan_bas.pdf");

}


function showData(data){

data.sort(function(a,b){
return new Date(b.tarikhPergi)-new Date(a.tarikhPergi);
});

let html="";
let status={};
let kalendar="";

let today=new Date();
today.setHours(0,0,0,0);

data.forEach(function(item,index){

let tripDate=new Date(item.tarikhPergi);
tripDate.setHours(0,0,0,0);

let diff=(tripDate-today)/(1000*60*60*24);

let kelas="";

if(diff===0){
kelas="today";
}
else if(diff<=7 && diff>0){
kelas="soon";
}

/* detect clash */

for(let i=0;i<data.length;i++){

if(i!==index){

let other=data[i];

if(
formatTarikh(item.tarikhPergi)===formatTarikh(other.tarikhPergi)
&& item.kenderaan===other.kenderaan
){
kelas="clash";
}

}

}

html+="<tr class='"+kelas+"'>";

html+="<td>"+item.nama+"</td>";
html+="<td>"+formatTarikh(item.tarikhPergi)+"</td>";
html+="<td>"+formatTarikh(item.tarikhPulang)+"</td>";
html+="<td>"+item.aktiviti+"</td>";
html+="<td>"+item.kenderaan+"</td>";
html+="<td><button onclick='downloadPDF("+JSON.stringify(item)+")'>PDF</button></td>";

html+="</tr>";

let tarikh=formatTarikh(item.tarikhPergi);

if(!status[tarikh]){
status[tarikh]={Bas:true,Van:true,Coaster:true};
}

if(item.kenderaan.includes("Bas")) status[tarikh].Bas=false;
if(item.kenderaan.includes("Van")) status[tarikh].Van=false;
if(item.kenderaan.includes("Coaster")) status[tarikh].Coaster=false;

kalendar+="<li>📅 "+formatTarikh(item.tarikhPergi)+" - "+item.kenderaan+" ("+item.aktiviti+")</li>";

});

document.getElementById("dataTempahan").innerHTML=html;

let htmlStatus="";

for(let tarikh in status){

htmlStatus+="<tr>";

htmlStatus+="<td>"+tarikh+"</td>";

htmlStatus+="<td class='"+(status[tarikh].Bas?"tersedia":"ditempah")+"'>"+(status[tarikh].Bas?"✅":"❌")+"</td>";
htmlStatus+="<td class='"+(status[tarikh].Van?"tersedia":"ditempah")+"'>"+(status[tarikh].Van?"✅":"❌")+"</td>";
htmlStatus+="<td class='"+(status[tarikh].Coaster?"tersedia":"ditempah")+"'>"+(status[tarikh].Coaster?"✅":"❌")+"</td>";

htmlStatus+="</tr>";

}

document.getElementById("statusTempahan").innerHTML=htmlStatus;

document.getElementById("kalendarTempahan").innerHTML=kalendar;

}

function loadDashboard(){

var script=document.createElement("script");

script.src=URL+"?callback=showData";

document.body.appendChild(script);

}

loadDashboard();

</script>

</body>
</html>
