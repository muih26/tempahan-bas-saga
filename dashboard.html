<script>

const URL = "https://script.google.com/macros/s/AKfycbxadg3jzotgg2cyTAoO8sJnlbWZs0LfNAbsNWnevVMMCEaA8uvKwmc7kpwOwuqBHlcwxQ/exec";

function formatTarikh(t){

if(!t) return "-";

let d = new Date(t);

let day = String(d.getDate()).padStart(2,'0');
let month = String(d.getMonth()+1).padStart(2,'0');
let year = d.getFullYear();

return day + "/" + month + "/" + year;

}

function showData(data){

let html="";

data.forEach(item=>{

html += `
<tr>
<td>${item.nama}</td>
<td>${formatTarikh(item.tarikh)}</td>
<td>${item.aktiviti}</td>
<td>${item.pemandu}</td>
<td>${item.kenderaan}</td>
</tr>
`;

});

document.getElementById("dataTempahan").innerHTML = html;

}

function loadDashboard(){

var script = document.createElement("script");

script.src = URL + "?callback=showData";

document.body.appendChild(script);

}

loadDashboard();

</script>
