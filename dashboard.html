<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Dashboard Tempahan Bas</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

.overlap{
background:#ffcccc;
}

</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>Dashboard Tempahan Bas</h1>
<h3>SM Sains Alor Gajah</h3>

</header>


<div class="nav">

<a href="index.html">Menu Utama</a>
<a href="tempahan.html">Tempah Bas</a>

</div>


<table border="1" width="95%" align="center">

<thead>

<tr>

<th>Nama Pemohon</th>
<th>Tarikh Pergi</th>
<th>Tarikh Pulang</th>
<th>Tujuan</th>
<th>Pemandu</th>
<th>Kenderaan</th>
<th>PDF</th>

</tr>

</thead>

<tbody id="dataTempahan">

</tbody>

</table>


<script>

const URL="https://script.google.com/macros/s/AKfycbxaEm7o8hIe--aTlcw44V7sn_ulfQuOm8Y03z04veoqX__XHzrkWsHHd18S53hSjzOi/exec";

function formatTarikh(t){

if(!t) return "-";

let d=new Date(t);

let day=("0"+d.getDate()).slice(-2);
let month=("0"+(d.getMonth()+1)).slice(-2);
let year=d.getFullYear();

return day+"/"+month+"/"+year;

}


function downloadPDF(item){

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

doc.setFontSize(16);
doc.text("BORANG PERMOHONAN KENDERAAN",20,20);

doc.setFontSize(12);

doc.text("Sekolah : SM Sains Alor Gajah",20,40);

doc.text("Nama Pemohon : "+item.nama,20,60);

doc.text("Tarikh Pergi : "+formatTarikh(item.tarikhPergi),20,70);

doc.text("Tarikh Pulang : "+formatTarikh(item.tarikhPulang),20,80);

doc.text("Tujuan : "+item.aktiviti,20,90);

doc.text("Pemandu : "+item.pemandu,20,100);

doc.text("Kenderaan : "+item.kenderaan,20,110);


doc.text("_________________________",20,160);
doc.text("Tandatangan Pemohon",20,170);


doc.text("_________________________",140,160);
doc.text("Tandatangan Pelulus",140,170);


doc.save("borang_tempahan_bas.pdf");

}



function detectOverlap(data){

let used={}

data.forEach(item=>{

let key=item.kenderaan+"-"+item.tarikhPergi

if(!used[key]){
used[key]=1
}else{
item.overlap=true
}

})

}



function showData(data){

data.sort((a,b)=> new Date(b.tarikhPergi)-new Date(a.tarikhPergi))

detectOverlap(data)

let html="";

data.forEach(function(item){

let rowClass=item.overlap ? "class='overlap'" : ""

html+="<tr "+rowClass+">";

html+="<td>"+item.nama+"</td>";

html+="<td>"+formatTarikh(item.tarikhPergi)+"</td>";

html+="<td>"+formatTarikh(item.tarikhPulang)+"</td>";

html+="<td>"+item.aktiviti+"</td>";

html+="<td>"+item.pemandu+"</td>";

html+="<td>"+item.kenderaan+"</td>";

html+="<td><button onclick='downloadPDF("+JSON.stringify(item)+")'>Download PDF</button></td>";

html+="</tr>";

});

document.getElementById("dataTempahan").innerHTML=html;

}


function loadDashboard(){

var script=document.createElement("script");

script.src=URL+"?callback=showData";

document.body.appendChild(script);

}

loadDashboard();

</script>

</body>
</html>
