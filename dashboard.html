<script>

const URL = "https://script.google.com/macros/s/AKfycbxj_fXliIj3MLhmJgzRwOOOC1gtiO3gexd7qn5Y-Qrsa9mClwCWpVP1_HWWJYBe8s3A/exec";

function formatTarikh(t){

if(!t) return "-"

let d = new Date(t)

return d.getDate().toString().padStart(2,'0') + "/" +
(d.getMonth()+1).toString().padStart(2,'0') + "/" +
d.getFullYear()

}

function loadDashboard(){

fetch(URL)

.then(res => res.json())

.then(data => {

let html=""

data.forEach(item => {

html += `
<tr>

<td>${item.nama}</td>
<td>${formatTarikh(item.tarikh)}</td>
<td>${item.aktiviti}</td>
<td>${item.pemandu}</td>
<td>${item.kenderaan}</td>

</tr>
`

})

document.getElementById("dataTempahan").innerHTML = html

})

}

loadDashboard()

</script>
