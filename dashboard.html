<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Dashboard Tempahan Bas</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

.clash{
background-color:#ffb3b3;
}

.section-title{
background:#666;
color:white;
padding:10px;
width:95%;
margin:auto;
margin-top:30px;
}

</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>Dashboard Tempahan Bas</h1>
<h3>SM Sains Alor Gajah</h3>

</header>


<div class="menu">

<a href="index.html">Menu Utama</a>
<a href="tempahan.html">Tempah Bas</a>

</div>


<!-- ================= SENARAI TEMPAHAN ================= -->

<div class="section-title">Senarai Tempahan</div>

<table border="1" width="95%" align="center">

<thead>

<tr>

<th>Nama Pemohon</th>
<th>Jawatan</th>
<th>Tempat</th>
<th>Pelajar Lelaki</th>
<th>Pelajar Perempuan</th>
<th>Guru</th>
<th>Tarikh Pergi</th>
<th>Tarikh Pulang</th>
<th>Tujuan</th>
<th>Kenderaan</th>
<th>PDF</th>

</tr>

</thead>

<tbody id="dataTempahan"></tbody>

</table>


<!-- ================= STATUS KENDERAAN ================= -->

<div class="section-title">Status Kenderaan</div>

<table border="1" width="95%" align="center">

<thead>

<tr>

<th>Tarikh</th>
<th>Bas</th>
<th>Van</th>
<th>Coaster</th>

</tr>

</thead>

<tbody id="statusTempahan"></tbody>

</table>


<!-- ================= KALENDAR TEMPAHAN ================= -->

<div class="section-title">Kalendar Tempahan</div>

<ul id="kalendarTempahan" style="width:95%;margin:auto;background:white;padding:15px;"></ul>


<script>

const URL="https://script.google.com/macros/s/AKfycby6wnDHTMcQpyQnEHbwqtX5jbj45z_vvORbYQa7MdOQDUcs7I5bYYQaHcEK7lJGBzgdRg/exec";


function formatTarikh(t){

if(!t) return "-";

let d=new Date(t);

return d.toLocaleDateString("en-GB");

}


function detectClash(data,index){

let current=data[index];

for(let i=0;i<data.length;i++){

if(i!==index){

let other=data[i];

if(current.kenderaan===other.kenderaan){

let start1=new Date(current.tarikhPergi);
let end1=new Date(current.tarikhPulang);

let start2=new Date(other.tarikhPergi);
let end2=new Date(other.tarikhPulang);

if(start1<=end2 && end1>=start2){

return true;

}

}

}

}

return false;

}



function downloadPDF(item){

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

doc.setFontSize(16);
doc.text("BORANG TEMPAHAN BAS",20,20);

doc.setFontSize(12);

doc.text("Nama Pemohon : "+item.nama,20,40);
doc.text("Jawatan : "+item.jawatan,20,50);
doc.text("Tempat : "+item.tempat,20,60);
doc.text("Pelajar Lelaki : "+item.pelajarLelaki,20,70);
doc.text("Pelajar Perempuan : "+item.pelajarPerempuan,20,80);
doc.text("Guru : "+item.guru,20,90);
doc.text("Tarikh Pergi : "+formatTarikh(item.tarikhPergi),20,100);
doc.text("Tarikh Pulang : "+formatTarikh(item.tarikhPulang),20,110);
doc.text("Tujuan : "+item.aktiviti,20,120);
doc.text("Kenderaan : "+item.kenderaan,20,130);

doc.save("tempahan_bas.pdf");

}



function showData(data){

data.sort(function(a,b){

return new Date(b.tarikhPergi)-new Date(a.tarikhPergi);

});


let html="";
let status={};
let kalendar="";


data.forEach(function(item,index){

let clash=detectClash(data,index);

html+="<tr class='"+(clash?"clash":"")+"'>";

html+="<td>"+(item.nama||"-")+"</td>";
html+="<td>"+(item.jawatan||"-")+"</td>";
html+="<td>"+(item.tempat||"-")+"</td>";
html+="<td>"+(item.pelajarLelaki||"-")+"</td>";
html+="<td>"+(item.pelajarPerempuan||"-")+"</td>";
html+="<td>"+(item.guru||"-")+"</td>";
html+="<td>"+formatTarikh(item.tarikhPergi)+"</td>";
html+="<td>"+formatTarikh(item.tarikhPulang)+"</td>";
html+="<td>"+(item.aktiviti||"-")+"</td>";
html+="<td>"+(item.kenderaan||"-")+"</td>";

html+="<td><button onclick='downloadPDF("+JSON.stringify(item)+")'>Download PDF</button></td>";

html+="</tr>";



let tarikh=formatTarikh(item.tarikhPergi);

if(!status[tarikh]){
status[tarikh]={Bas:true,Van:true,Coaster:true};
}

if(item.kenderaan.includes("Bas")) status[tarikh].Bas=false;
if(item.kenderaan.includes("Van")) status[tarikh].Van=false;
if(item.kenderaan.includes("Coaster")) status[tarikh].Coaster=false;



kalendar+="<li>"+formatTarikh(item.tarikhPergi)+" - "+item.kenderaan+" ("+item.aktiviti+")</li>";

});


document.getElementById("dataTempahan").innerHTML=html;



let htmlStatus="";

for(let tarikh in status){

htmlStatus+="<tr>";

htmlStatus+="<td>"+tarikh+"</td>";

htmlStatus+="<td>"+(status[tarikh].Bas?"✅":"❌")+"</td>";
htmlStatus+="<td>"+(status[tarikh].Van?"✅":"❌")+"</td>";
htmlStatus+="<td>"+(status[tarikh].Coaster?"✅":"❌")+"</td>";

htmlStatus+="</tr>";

}

document.getElementById("statusTempahan").innerHTML=htmlStatus;


document.getElementById("kalendarTempahan").innerHTML=kalendar;

}



function loadDashboard(){

var script=document.createElement("script");

script.src=URL+"?callback=showData";

document.body.appendChild(script);

}

loadDashboard();

</script>

</body>
</html>
