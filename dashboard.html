<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Dashboard Tempahan Bas</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>Dashboard Tempahan Bas</h1>
<h3>SM Sains Alor Gajah</h3>

</header>


<div class="nav">

<a href="index.html">Menu Utama</a>

<a href="tempahan.html">Tempah Bas</a>

</div>


<table>

<thead>

<tr>

<th>Nama Pemohon</th>
<th>Tarikh</th>
<th>Tujuan</th>
<th>Pemandu</th>
<th>Kenderaan</th>

</tr>

</thead>

<tbody id="dataTempahan">

</tbody>

</table>



<script>

const URL = "https://script.google.com/macros/s/AKfycbxadg3jzotgg2cyTAoO8sJnlbWZs0LfNAbsNWnevVMMCEaA8uvKwmc7kpwOwuqBHlcwxQ/exec";


function formatTarikh(t){

if(!t) return "-";

let d = new Date(t);

let day = String(d.getDate()).padStart(2,'0');
let month = String(d.getMonth()+1).padStart(2,'0');
let year = d.getFullYear();

return day + "/" + month + "/" + year;

}



function showData(data){

let html="";

data.forEach(function(item){

html += `
<tr>
<td>${item.nama}</td>
<td>${formatTarikh(item.tarikh)}</td>
<td>${item.aktiviti}</td>
<td>${item.pemandu}</td>
<td>${item.kenderaan}</td>
</tr>
`;

});

document.getElementById("dataTempahan").innerHTML = html;

}



function loadDashboard(){

var script = document.createElement("script");

script.src = URL + "?callback=showData";

document.body.appendChild(script);

}


loadDashboard();

</script>


</body>

</html>
