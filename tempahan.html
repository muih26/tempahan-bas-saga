<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Tempahan Bas</title>

<link rel="stylesheet" href="style.css">

<style>

.checkbox-group{
margin-bottom:20px;
}

.checkbox-item{
display:flex;
align-items:center;
gap:10px;
margin-bottom:8px;
}

</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>Tempahan Bas</h1>
<h3>SM Sains Alor Gajah</h3>

</header>


<div class="menu">

<a href="index.html">Menu Utama</a>
<a href="dashboard.html">Dashboard</a>

</div>


<div class="container">

<form id="borangTempahan">

<label>Tarikh Mohon</label>
<input type="date" id="tarikhMohon">

<label>Aktiviti</label>
<input type="text" id="aktiviti">

<label>Tempat</label>
<input type="text" id="tempat">

<label>Nama Pemohon</label>
<input type="text" id="nama">

<label>Jawatan</label>
<input type="text" id="jawatan">

<label>Pelajar Lelaki</label>
<input type="number" id="lelaki">

<label>Pelajar Perempuan</label>
<input type="number" id="perempuan">

<label>Guru</label>
<input type="number" id="guru">

<label>Tarikh Pergi</label>
<input type="date" id="tarikhPergi">

<label>Tarikh Pulang</label>
<input type="date" id="tarikhPulang">

<label>Masa Pergi</label>
<input type="time" id="masaPergi">

<label>Masa Balik</label>
<input type="time" id="masaBalik">


<h3>Kenderaan</h3>

<div class="checkbox-group">

<div class="checkbox-item">
<input type="checkbox" id="bas">
<label>Bas</label>
</div>

<div class="checkbox-item">
<input type="checkbox" id="coaster">
<label>Coaster</label>
</div>

<div class="checkbox-item">
<input type="checkbox" id="van">
<label>Van</label>
</div>

</div>



<h3>Pemandu</h3>

<div class="checkbox-group">

<div class="checkbox-item">
<input type="checkbox" id="faizal">
<label>En. Faizal</label>
</div>

<div class="checkbox-item">
<input type="checkbox" id="nuri">
<label>En. Nuri</label>
</div>

</div>


<button type="button" onclick="hantarTempahan()">Hantar Tempahan</button>

</form>

</div>


<script>

function hantarTempahan(){

let pemandu=[];
let kenderaan=[];

if(document.getElementById("faizal").checked){
pemandu.push("En. Faizal");
}

if(document.getElementById("nuri").checked){
pemandu.push("En. Nuri");
}

if(document.getElementById("bas").checked){
kenderaan.push("Bas");
}

if(document.getElementById("coaster").checked){
kenderaan.push("Coaster");
}

if(document.getElementById("van").checked){
kenderaan.push("Van");
}

let data={

tarikhMohon:document.getElementById("tarikhMohon").value,
aktiviti:document.getElementById("aktiviti").value,
tempat:document.getElementById("tempat").value,
nama:document.getElementById("nama").value,
jawatan:document.getElementById("jawatan").value,

lelaki:document.getElementById("lelaki").value,
perempuan:document.getElementById("perempuan").value,
guru:document.getElementById("guru").value,

tarikhPergi:document.getElementById("tarikhPergi").value,
tarikhPulang:document.getElementById("tarikhPulang").value,

masaPergi:document.getElementById("masaPergi").value,
masaBalik:document.getElementById("masaBalik").value,

kenderaan:kenderaan.join(", "),
pemandu:pemandu.join(", ")

};


fetch("https://script.google.com/macros/s/AKfycbxaEm7o8hIe--aTlcw44V7sn_ulfQuOm8Y03z04veoqX__XHzrkWsHHd18S53hSjzOi/exec",{

method:"POST",
mode:"no-cors",
body:JSON.stringify(data)

})

.then(()=>{

alert("Tempahan berjaya dihantar");

document.getElementById("borangTempahan").reset();

setTimeout(function(){

window.location.href="dashboard.html";

},1500);

});

}

</script>

</body>
</html>
