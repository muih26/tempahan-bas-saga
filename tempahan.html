<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Tempahan Bas</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

.opsyen{
width:400px;
margin-bottom:20px;
}

.opsyen-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px 0;
border-bottom:1px solid #ddd;
}

button{
padding:10px 15px;
background:#1976d2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#125aa0;
}

</style>

</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<h1>Tempahan Bas</h1>
<h3>SM Sains Alor Gajah</h3>

</header>


<div class="menu">

<a href="index.html">Menu Utama</a>
<a href="dashboard.html">Dashboard</a>

</div>


<div class="container">

<form id="borangTempahan">

<label>Tarikh Mohon</label>
<input type="date" id="tarikhMohon" required>

<label>Aktiviti</label>
<input type="text" id="aktiviti" required>

<label>Tempat</label>
<input type="text" id="tempat" required>

<label>Nama Pemohon</label>
<input type="text" id="nama" required>

<label>Jawatan</label>
<input type="text" id="jawatan">

<label>Pelajar Lelaki</label>
<input type="number" id="lelaki">

<label>Pelajar Perempuan</label>
<input type="number" id="perempuan">

<label>Guru</label>
<input type="number" id="guru">

<label>Tarikh Pergi</label>
<input type="date" id="tarikhPergi" required>

<label>Tarikh Pulang</label>
<input type="date" id="tarikhPulang" required>

<label>Masa Pergi</label>
<input type="time" id="masaPergi">

<label>Masa Balik</label>
<input type="time" id="masaBalik">


<h3>Kenderaan</h3>

<div class="opsyen">

<div class="opsyen-row">
<span>Bas</span>
<input type="checkbox" id="bas">
</div>

<div class="opsyen-row">
<span>Coaster</span>
<input type="checkbox" id="coaster">
</div>

<div class="opsyen-row">
<span>Van</span>
<input type="checkbox" id="van">
</div>

</div>

<button type="submit">Hantar Tempahan</button>

</form>

</div>


<script>

const URL="https://script.google.com/macros/s/AKfycbwlGgsHcFFlJmiXVY9fDBHfEHZRUVfmOKA83UUWKtsemy79dJgTjI-vPu0T5aF47sluiA/exec";

document.getElementById("borangTempahan").addEventListener("submit", function(e){

e.preventDefault();

let kenderaan=[];

if(document.getElementById("bas").checked){
kenderaan.push("Bas");
}

if(document.getElementById("coaster").checked){
kenderaan.push("Coaster");
}

if(document.getElementById("van").checked){
kenderaan.push("Van");
}

if(kenderaan.length===0){

Swal.fire({
icon:'warning',
title:'Sila pilih kenderaan'
});

return;

}

let data={

tarikhMohon:document.getElementById("tarikhMohon").value,
aktiviti:document.getElementById("aktiviti").value,
tempat:document.getElementById("tempat").value,

nama:document.getElementById("nama").value,
jawatan:document.getElementById("jawatan").value,

pelajarLelaki:document.getElementById("lelaki").value,
pelajarPerempuan:document.getElementById("perempuan").value,
guru:document.getElementById("guru").value,

tarikhPergi:document.getElementById("tarikhPergi").value,
tarikhPulang:document.getElementById("tarikhPulang").value,

masaPergi:document.getElementById("masaPergi").value,
masaBalik:document.getElementById("masaBalik").value,

kenderaan:kenderaan.join(", ")

};

fetch(URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{

Swal.fire({
icon:'success',
title:'Tempahan Berjaya',
timer:2000,
showConfirmButton:false
});

document.getElementById("borangTempahan").reset();

setTimeout(function(){
window.location.href="dashboard.html";
},2000);

});

});

</script>

</body>
</html>
