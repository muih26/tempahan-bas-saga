<!DOCTYPE html>
<html>

<link rel="stylesheet" href="style.css">

<style>

.opsyen{

<body>

<div class="menu">

<form id="borangTempahan">

</div>

<h3>Pemandu</h3>

<div class="opsyen">

<div class="opsyen-row">
<span>En. Faizal</span>
<input type="checkbox" id="faizal">
</div>

<div class="opsyen-row">

</div>
